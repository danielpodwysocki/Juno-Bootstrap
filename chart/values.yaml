genesis:
  repoURL: "https://github.com/juno-fx/Genesis-Deployment.git"
  chartPath: ./
  version: "v4.2.0"
  config:
    host:
    http_scheme: https
# Ingress provider: "envoy-gateway" (default) installs Envoy Gateway as a
# secondary gateway (see envoyGateway below); "nginx" installs ingress-nginx
# (the `ingress:` block below). Either way the workload charts render their
# routes for the chosen provider. Set ingress.enabled=false to install neither
# (bring-your-own gateway — e.g. one already managed elsewhere).
orionIngressProvider: envoy-gateway

ingress:
  enabled: true
  # nginx settings (used only when orionIngressProvider=nginx)
  chart: ingress-nginx
  # Used when the repoURL is git-based, eg.
  # chartPath: charts/ingress-nginx
  chartPath:
  repoURL: "https://kubernetes.github.io/ingress-nginx"
  version: 4.12.1
  config:
    controller:
      kind: DaemonSet

# Envoy Gateway settings (used when orionIngressProvider=envoy-gateway)
envoyGateway:
  registry: docker.io/envoyproxy
  chartVersion: v1.8.1
  # Whether this chart installs/manages the Gateway API + Envoy Gateway CRDs
  # (bundled in gateway-helm). DEFAULT false: skip them, so Argo never prunes
  # cluster-wide CRDs (a prune cascade-deletes every Gateway/HTTPRoute/EnvoyProxy
  # on the cluster). Provision the CRDs out-of-band (see README), or set true to
  # let this chart manage them.
  installCRDs: false
  # extra helm values for the gateway-helm chart (optional)
  config: {}
  gateway:
    name: juno
    namespace: envoy-gateway-system
    className: envoy-gateway
    # Pin the LB IP (Cilium LB-IPAM) — leave empty to let IPAM choose.
    lbIP: ""
    # Label for a CiliumL2AnnouncementPolicy (empty to skip labeling).
    l2Label: envoy-gateway
    # Secret with the TLS cert for the HTTPS listener (empty = HTTP only).
    tlsSecretName: ""
    # Pod tolerations for the provisioned Envoy (e.g. to run on control plane).
    tolerations: []
    # Replicas for the provisioned Envoy proxy. Empty -> Envoy Gateway's default.
    replicas: ""
    # Container resources for the provisioned Envoy proxy (requests/limits).
    # Empty -> Envoy Gateway's defaults; set to override.
    resources: {}

aws_marketplace: {}